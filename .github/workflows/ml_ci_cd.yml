name: Linear Regression ML CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Setup Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    # Step 3: Install ML libraries
    - name: Install ML Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Continuous Integration - Run validation checks
    - name: Run Model Validation Tests
      run: |
        pytest test_model.py

    # Step 5: Continuous Deployment - Save production-ready model
    - name: Deploy Trained Model Artifact
      if: success() # Only runs if all tests passed
      uses: actions/upload-artifact@v4
      with:
        name: production-linear-regression-model
        path: |
          linear_model.pkl
          metrics.txt